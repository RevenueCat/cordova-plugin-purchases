version: 2.1
orbs:
  macos: circleci/macos@2.3.6
  android: circleci/android@2.5.0
  revenuecat: revenuecat/sdks-common-config@3.16.0

aliases:
  base-mac-job: &base-mac-job
    resource_class: m4pro.medium
    macos:
      xcode: '16.4.0'
    shell: /bin/bash --login -o pipefail

  release-tags: &release-tags
    filters:
      tags:
        ignore: /^.*-SNAPSHOT/
      branches:
        ignore: /.*/

parameters:
  action:
    type: enum
    enum: [build, upgrade-hybrid-common, bump]
    default: build
  version:
    type: string
    default: ''
  automatic:
    type: boolean
    default: false

commands:

  npm-dependencies:
    description: "Install all global and local npm dependencies"
    steps:
      - run: npm install -g cordova@11
      - run: npm install --legacy-peer-deps
      - run: npm install -g yarn

  install-ruby:
    parameters:
      directory:
        type: string
        default: .
    steps:
      - restore_cache:
          keys:
            # This cache key should be updated whenever we change the Ruby version
            - v4-gem-cache-{{ arch }}-ruby-3.2.0
      # CircleCI images fail on Ruby 3.3
      # https://github.com/fastlane/fastlane/issues/21794#issuecomment-2021331335
      # Also, not using macos/switch-ruby because its broken
      - run:
          # We're using Ruby 3.2.0 here to avoid an issue that caused a crash with Fastlane and Ruby 3.2.2.
          name: Set Ruby 3.2.0
          command: |
            eval "$(rbenv init -)"
            rbenv install -s 3.2.0  # Replace with your required Ruby version
            rbenv global 3.2.0
            rbenv rehash
      - run:
          name: Verify Ruby version
          command: ruby -v
      - save_cache:
          # This cache key should be updated whenever we change the Ruby version
          key: v4-gem-cache-{{ arch }}-ruby-3.2.0
          paths:
            - ~/.rbenv/versions/3.2.0

  api-tester-dependencies:
    description: "Install API Tester dependencies"
    steps:
       - install-nvm
       - save_cache:
          paths:
            - node_modules
          key: api-tester-dependencies-{{ checksum "package.json" }}

  yarn-dependencies:
    description: "Install yarn dependencies"
    steps:
       - install-nvm
       - npm-dependencies
       - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package.json" }}
            - v1-dependencies-
       - run: yarn
       - save_cache:
          paths:
            - node_modules
          key: v1-dependencies-{{ checksum "package.json" }}

  npm-ios-dependencies:
    description: "Install all ios global and local npm dependencies"
    steps:
      - run: npm install -g ios-deploy
      - run: npm install --legacy-peer-deps

  npm-install-cordova-paramedic:
    description: "Install Cordova paramedic"
    steps:
      - run:
          name: Install Cordova Paramedic
          command: npm install --location=global github:apache/cordova-paramedic#2243a96d23e9a27213cbbf17634df0beb3463bdb

  replace-api-key-linux:
    description: "Replace API_KEY"
    steps:
      - run: sed -i s/api_key/$API_KEY/ tests/tests.js

  replace-api-key:
    description: "Replace API_KEY"
    steps:
      - run: sed -i .bck s/api_key/$API_KEY/ tests/tests.js

  install-sdkman:
    description: Install SDKMAN
    steps:
      - run:
          name: Installing SDKMAN
          command: |
            curl -s "https://get.sdkman.io?rcupdate=false" | bash
            echo -e '\nsource "/home/circleci/.sdkman/bin/sdkman-init.sh"' >> $BASH_ENV
            source $BASH_ENV
      - run:
          name: Setup Java environment
          command: |
            sdk env install
            echo -e '\nexport JAVA_HOME="/home/circleci/.sdkman/candidates/java/current"' >> $BASH_ENV

  install-nvm:
    steps:
      - run:
          name: Install node 18.20.7
          command: |
            curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.35.3/install.sh | bash
            echo 'export NVM_DIR="$([ -z "${XDG_CONFIG_HOME-}" ] && printf %s "${HOME}/.nvm" || printf %s "${XDG_CONFIG_HOME}/nvm")"' >> $BASH_ENV
            echo '[ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"' >> $BASH_ENV
      - run: nvm install 18.20.7
      - run: nvm use 18.20.7
      - run: echo 'nvm use 18.20.7' >> $BASH_ENV
      - run: node -v

  copy-npm-rc:
    steps:
      - run:
          name: Copy npmrc sample file to final location
          command: cp .npmrc.SAMPLE .npmrc

  install-and-create-sim:
    parameters:
      install-simulator-name:
        type: string
      sim-device-type:
        type: string
      sim-device-runtime:
        type: string
      sim-name:
        type: string
    steps:
      - run:
          name: Install xcode-install
          command: gem install xcode-install
      - run:
          name: Install simulator
          command: | # Print all available simulators and install required one
              xcversion simulators
              xcversion simulators --install="<< parameters.install-simulator-name >>"
      - run:
          name: Create simulator
          command: xcrun simctl create '<< parameters.sim-name >>' com.apple.CoreSimulator.SimDeviceType.<< parameters.sim-device-type >> com.apple.CoreSimulator.SimRuntime.<< parameters.sim-device-runtime >>

jobs:
  android-integration-test:
    description: "Run Android integration tests for Cordova"
    executor:
      name: android/android-machine
      resource-class: large
      tag: 2024.04.1
    shell: /bin/bash --login -o pipefail
    steps:
      - checkout
      - install-sdkman
      - android/create-avd:
          avd-name: myavd
          system-image: system-images;android-32;google_apis;x86_64
          install: true
      - android/start-emulator:
          avd-name: myavd
          no-window: true
          wait-for-emulator: false
          post-emulator-launch-assemble-command: ""
      - install-nvm
      - npm-dependencies
      - npm-install-cordova-paramedic
      - replace-api-key-linux
      - run: sdk install gradle 7.5
      - run: rm -rf ~/.gradle/caches/
      - run: npm run test:android
    environment:
      JVM_OPTS: -Xmx6g
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"

  ios-integration-test:
    description: "Run iOS integration tests for a specific cordova-ios version"
    parameters:
      cordova-ios-version:
        type: string
      xcode-version:
        type: string
        default: '15.4'
      simulator-device:
        type: string
        default: 'iPhone 15'
      simulator-os-version:
        type: string
        default: '17.5'
      paramedic-target:
        type: string
        default: 'iPhone-15'
    resource_class: m4pro.medium
    macos:
      xcode: << parameters.xcode-version >>
    shell: /bin/bash --login -o pipefail
    steps:
      - checkout
      - macos/preboot-simulator:
          device: << parameters.simulator-device >>
          version: << parameters.simulator-os-version >>
      - npm-dependencies
      - npm-install-cordova-paramedic
      - npm-ios-dependencies
      - replace-api-key
      - run:
          name: "Integration tests (cordova-ios << parameters.cordova-ios-version >>)"
          command: |
            cordova-paramedic --verbose \
              --platform "ios@<< parameters.cordova-ios-version >>" \
              --plugin . \
              --target "<< parameters.paramedic-target >>"
          no_output_timeout: 30m

  runtest:
    docker:
      - image: cimg/ruby:3.2

    steps:
      - checkout
      - yarn-dependencies
      - run: yarn test
      - run: yarn tslint
      - run:
          name: Build
          command: |
            yarn build

  api-tester:
    docker:
      - image: cimg/ruby:3.2

    steps:
      - checkout
      - api-tester-dependencies
      - restore_cache:
          keys:
            - api-tester-dependencies-{{ checksum "package.json" }}
      - run:
          name: Install and compile plugin
          command: npm install
      - run:
          name: Compile API Tester
          command: npx tsc -p apiTester

  docs-deploy:
    docker:
      - image: cimg/ruby:3.2

    steps:
      - checkout
      - yarn-dependencies
      - revenuecat/install-gem-unix-dependencies:
          cache-version: v1
      - revenuecat/setup-git-credentials
      - revenuecat/trust-github-key
      - run:
          name: Build docs
          command: bundle exec fastlane generate_docs

  make-release:
    description: "Publishes the new version and creates a github release"
    <<: *base-mac-job
    steps:
      - checkout
      - npm-dependencies
      - install-ruby
      - revenuecat/install-gem-mac-dependencies:
          cache-version: v1
      - revenuecat/trust-github-key
      - copy-npm-rc
      - run:
          name: release
          command: bundle exec fastlane release

  run-maestro-e2e-tests-ios:
    <<: *base-mac-job
    macos:
      xcode: '26.3.0'
    steps:
      - checkout
      - install-ruby
      - revenuecat/install-gem-mac-dependencies:
          cache-version: v1
      - npm-dependencies
      - revenuecat/install-maestro
      - run:
          name: Boot iOS Simulator
          command: |
            xcrun simctl boot "iPhone 17" || true
            xcrun simctl bootstatus "iPhone 17" -b
      - run:
          name: Run Maestro E2E Tests (iOS)
          command: bundle exec fastlane run_maestro_e2e_tests_ios
          no_output_timeout: 15m
      - store_test_results:
          path: fastlane/test_output
      - store_artifacts:
          path: fastlane/test_output

  run-maestro-e2e-tests-android:
    machine:
      image: android:2025.10.1
    resource_class: xlarge
    steps:
      - checkout
      - run:
          name: Install Ruby and Bundler
          command: |
            rbenv install 3.2.0 --skip-existing
            rbenv global 3.2.0
            gem install bundler --no-document
            bundle install
      - npm-dependencies
      - run:
          name: Build Maestro app (Android)
          command: bundle exec fastlane build_maestro_app_android
          no_output_timeout: 15m
      - android/create-avd:
          avd-name: test-e2e
          system-image: system-images;android-34;google_apis;x86_64
          install: true
      - android/start-emulator:
          avd-name: test-e2e
          post-emulator-launch-assemble-command: ""
      - revenuecat/install-maestro
      - run:
          name: Run Maestro E2E Tests (Android)
          command: bundle exec fastlane run_maestro_e2e_tests_android
          no_output_timeout: 15m
      - store_test_results:
          path: fastlane/test_output
      - store_artifacts:
          path: fastlane/test_output

  update-hybrid-common-versions:
    description: "Creates a PR updating purchases-hybrid-common to latest release"
    <<: *base-mac-job
    steps:
      - checkout
      - npm-dependencies
      - install-ruby
      - revenuecat/install-gem-mac-dependencies:
          cache-version: v1
      - revenuecat/trust-github-key
      - revenuecat/setup-git-credentials
      - run:
          name: Updating to next version of phc
          command: |
            bundle exec fastlane update_hybrid_common \
            version:<< pipeline.parameters.version >> \
            open_pr:true \
            automatic_release:<< pipeline.parameters.automatic >>

  all-tests-succeeded:
    description: "Gate job: required status check for merging PRs"
    docker:
      - image: cimg/base:stable
    resource_class: small
    steps:
      - run: echo "All tests succeeded"

  plugin-installation-test:
    description: "Verify cordova plugin add works on both cordova-ios 7 and 8"
    <<: *base-mac-job
    steps:
      - checkout
      - install-nvm
      - run:
          name: Install Cordova and CocoaPods
          command: |
            npm install -g cordova
            brew install cocoapods
      - run:
          name: Build and pack plugin
          command: |
            npm install && npm run build
            npm pack
            mkdir -p /tmp/plugin && tar -xzf cordova-plugin-purchases-*.tgz -C /tmp/plugin --strip-components=1
            # cordova plugin add <local-dir> triggers `npm install` which re-runs the
            # `prepare` script (tsc). This fails because npm pack correctly excludes
            # tsconfig.json. Real users install from the npm registry where `prepare`
            # is never executed, so stripping scripts matches the actual user experience.
            node -e "p=require('/tmp/plugin/package.json'); delete p.scripts; require('fs').writeFileSync('/tmp/plugin/package.json',JSON.stringify(p,null,2))"
      - run:
          name: "Test plugin installation: cordova-ios 7"
          command: |
            set -e
            cd /tmp && cordova create test-ios7 com.revenuecat.installtest InstallTest
            cd test-ios7
            cordova platform add ios@7
            cordova plugin add /tmp/plugin
            echo "cordova-ios 7: plugin installed successfully"
      - run:
          name: "Test plugin installation: cordova-ios 8"
          command: |
            set -e
            cd /tmp && cordova create test-ios8 com.revenuecat.installtest InstallTest
            cd test-ios8
            cordova platform add ios@8
            cordova plugin add /tmp/plugin
            echo "cordova-ios 8: plugin installed successfully"

workflows:
  version: 2

  # =============================================================
  # run-all-tests: Runs on every push except release branches and bump
  # =============================================================
  run-all-tests:
    when:
      and:
        - not:
            equal: [ scheduled_pipeline, << pipeline.trigger_source >> ]
        - not:
            matches:
              pattern: "^release/.*$"
              value: << pipeline.git.branch >>
        - equal: [ build, << pipeline.parameters.action >> ]
    jobs:
      - runtest
      - api-tester
      - plugin-installation-test
      - run-maestro-e2e-tests-ios:
          context:
            - e2e-tests
      - run-maestro-e2e-tests-android:
          context:
            - e2e-tests
      - android-integration-test
      - ios-integration-test:
          name: "ios-integration-test (cordova-ios 6)"
          cordova-ios-version: "6"
      # cordova-ios 7 cannot use Xcode 16.4+ due to an Apple simulator bug
      # (FB17006003) where HTTP/3 networking hangs on iOS 18.4+ simulators.
      # Xcode 26.x builds succeed, but cordova-paramedic crashes during the
      # simulator deploy phase with cordova-ios 7 on iOS 26.x.
      # Xcode 16.2 / iOS 18.2 is the newest combination that avoids both issues.
      - ios-integration-test:
          name: "ios-integration-test (cordova-ios 7)"
          cordova-ios-version: "7"
          xcode-version: "16.2.0"
          simulator-device: "iPhone 16"
          simulator-os-version: "18.2"
          paramedic-target: "iPhone-16"
      - ios-integration-test:
          name: "ios-integration-test (cordova-ios 8)"
          cordova-ios-version: "8"
          xcode-version: "26.4.0"
          simulator-device: "iPhone 17"
          simulator-os-version: "26.4"
          paramedic-target: "iPhone-17"
      - all-tests-succeeded:
          requires:
            - runtest
            - api-tester
            - plugin-installation-test
            - android-integration-test
            - "ios-integration-test (cordova-ios 6)"
            - "ios-integration-test (cordova-ios 7)"
            - "ios-integration-test (cordova-ios 8)"

  # =============================================================
  # release: Runs on release branches only
  # =============================================================
  release:
    when:
      and:
        - not:
            equal: [ scheduled_pipeline, << pipeline.trigger_source >> ]
        - matches:
            pattern: "^release/.*$"
            value: << pipeline.git.branch >>
    jobs:
      - runtest
      - api-tester
      - plugin-installation-test
      - android-integration-test
      - ios-integration-test:
          name: "ios-integration-test (cordova-ios 6)"
          cordova-ios-version: "6"
      # See cordova-ios 7 Xcode comment in run-all-tests workflow.
      - ios-integration-test:
          name: "ios-integration-test (cordova-ios 7)"
          cordova-ios-version: "7"
          xcode-version: "16.2.0"
          simulator-device: "iPhone 16"
          simulator-os-version: "18.2"
          paramedic-target: "iPhone-16"
      - ios-integration-test:
          name: "ios-integration-test (cordova-ios 8)"
          cordova-ios-version: "8"
          xcode-version: "26.4.0"
          simulator-device: "iPhone 17"
          simulator-os-version: "26.4"
          paramedic-target: "iPhone-17"
      - all-tests-succeeded:
          requires:
            - runtest
            - api-tester
            - plugin-installation-test
            - android-integration-test
            - "ios-integration-test (cordova-ios 6)"
            - "ios-integration-test (cordova-ios 7)"
            - "ios-integration-test (cordova-ios 8)"
      - hold:
          type: approval
          requires:
            - all-tests-succeeded
      - revenuecat/tag-current-branch:
          ruby_version: "3.2"
          requires:
            - hold

  # =============================================================
  # deploy: Runs on release tags only
  # =============================================================
  deploy:
    when:
      not:
        equal: [ scheduled_pipeline, << pipeline.trigger_source >> ]
    jobs:
      - make-release:
          <<: *release-tags
      - docs-deploy:
          requires:
            - make-release
          <<: *release-tags
      - revenuecat/merge-release-pr:
          repo_name: cordova-plugin-purchases
          requires:
            - docs-deploy
          <<: *release-tags

  danger:
    when:
      and:
        - not:
            equal: [ scheduled_pipeline, << pipeline.trigger_source >> ]
        - equal: [ build, << pipeline.parameters.action >> ]
    jobs:
      - revenuecat/danger:
          ruby_version: "3.2"
          filters:
            branches:
              ignore:
                - main
            tags:
              ignore: /.*/

  weekly-run-workflow:
    when:
      and:
        - equal: [ scheduled_pipeline, << pipeline.trigger_source >> ]
        - equal: [ "release-train", << pipeline.schedule.name >> ]
    jobs:
      - revenuecat/automatic-bump:
          ruby_version: "3.2"

  manual-trigger-bump:
    when:
      equal: [ bump, << pipeline.parameters.action >> ]
    jobs:
      - revenuecat/automatic-bump:
          ruby_version: "3.2"

  update-hybrid-common-versions:
    when:
      equal: [ upgrade-hybrid-common, << pipeline.parameters.action >> ]
    jobs:
      - update-hybrid-common-versions
