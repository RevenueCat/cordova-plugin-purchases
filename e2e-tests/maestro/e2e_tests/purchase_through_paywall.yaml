# This flow tests the purchase through paywall flow.
# Cordova does not have paywall presentation APIs, so instead of
# presenting a native paywall we fetch offerings and purchase the
# first available package directly.

appId: com.revenuecat.automatedsdktests
name: Purchase through paywall

---
- clearState
- pressKey: home
- launchApp:
    arguments:
        e2e_test_flow: purchase_through_paywall
# Extended wait because the Android emulator is slow on cold start and
# Cordova's `deviceready` event can take longer than Maestro's default
# assertVisible timeout.
- extendedWaitUntil:
    visible: "Entitlements: none"
    timeout: 30000
- tapOn: "Purchase"
- runFlow:
    file: ../utils/confirm_purchase.yaml
- assertVisible: "Entitlements: pro"
